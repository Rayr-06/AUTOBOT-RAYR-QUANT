name: Trading Bot

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:  # Allow manual trigger

jobs:
  trade:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --quiet \
            pandas numpy scipy \
            yfinance vectorbt \
            requests aiohttp
      
      - name: Run trading bot
        run: |
          python cloud_bot.py
      
      - name: Commit and push data
        run: |
          git config --local user.email "bot@rayrquant.com"
          git config --local user.name "RAYR Bot"
          git add data/
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Bot run: $(date +'%Y-%m-%d %H:%M UTC')" && git push)