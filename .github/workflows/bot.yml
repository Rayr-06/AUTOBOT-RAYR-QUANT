name: Adaptive Trading Bot

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours (more conservative)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run adaptive bot
        run: python master_bot.py
      
      - name: Commit results
        run: |
          git config --local user.email "bot@rayrquant.com"
          git config --local user.name "RAYR Bot"
          git add data/
          git diff --staged --quiet || git commit -m "Bot: $(date -u +'%Y-%m-%d %H:%M') UTC"
      
      - uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main