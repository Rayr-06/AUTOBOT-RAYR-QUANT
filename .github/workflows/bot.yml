name: Trading Bot + Analytics

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade-and-analyze:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - run: pip install -r requirements.txt
      
      - name: Run trading bot
        run: python master_bot.py
      
      - name: Calculate analytics
        run: python calculate_analytics.py
      
      - run: |
          git config --local user.email "bot@rayrquant.com"
          git config --local user.name "RAYR Bot"
          git add data/
          git diff --staged --quiet || git commit -m "Bot run + analytics: $(date -u +'%Y-%m-%d %H:%M') UTC"
      
      - uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main