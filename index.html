<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAYR QUANT - Performance Analytics</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 40px 24px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .header h1 { font-size: 32px; margin-bottom: 8px; }
        
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .metric-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        
        .metric-value.positive { color: #10b981; }
        .metric-value.negative { color: #ef4444; }
        .metric-value.neutral { color: #667eea; }
        
        .metric-label {
            font-size: 13px;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .verdict-box {
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        
        .verdict-box.EXCELLENT { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
        .verdict-box.GOOD { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; }
        .verdict-box.OKAY { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
        .verdict-box.POOR { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; }
        .verdict-box.INITIALIZING { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); color: white; }
        
        .verdict-status { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        .verdict-message { font-size: 16px; margin-bottom: 8px; opacity: 0.95; }
        .verdict-action { font-size: 14px; opacity: 0.85; font-weight: 600; }
        
        .score-item {
            padding: 16px;
            background: #f8fafc;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        
        .score-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-top: 32px;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        function Dashboard() {
            const [status, setStatus] = useState(null);
            const [analytics, setAnalytics] = useState(null);
            const [loading, setLoading] = useState(true);
            
            const fetchData = async () => {
                try {
                    const [statusRes, analyticsRes] = await Promise.all([
                        fetch('data/status.json?t=' + new Date().getTime()),
                        fetch('data/analytics.json?t=' + new Date().getTime())
                    ]);
                    
                    const statusData = await statusRes.json();
                    const analyticsData = await analyticsRes.json();
                    
                    setStatus(statusData);
                    setAnalytics(analyticsData);
                    setLoading(false);
                } catch (error) {
                    console.error('Error loading data:', error);
                    setLoading(false);
                }
            };
            
            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 60000);
                return () => clearInterval(interval);
            }, []);
            
            if (loading) {
                return (
                    <div className="container">
                        <div style={{textAlign: 'center', padding: '80px 24px', color: 'white'}}>
                            <div className="spinner"></div>
                            <p style={{marginTop: '16px'}}>Loading analytics...</p>
                        </div>
                    </div>
                );
            }
            
            if (!status || !analytics) {
                return (
                    <div className="container">
                        <div className="header">
                            <h1>📊 RAYR QUANT ANALYTICS</h1>
                        </div>
                        <div className="card">
                            <p style={{textAlign: 'center', padding: '32px', color: '#64748b'}}>
                                Not enough data yet. Run the bot first.
                            </p>
                        </div>
                    </div>
                );
            }
            
            const getMetricColor = (value, isPercentage = true) => {
                if (isPercentage) {
                    return value > 0 ? 'positive' : value < 0 ? 'negative' : 'neutral';
                }
                return 'neutral';
            };
            
            return (
                <div className="container">
                    <div className="header">
                        <h1>📊 RAYR QUANT ANALYTICS</h1>
                        <p style={{opacity: 0.9, fontSize: '14px', marginTop: '8px'}}>
                            Performance Tracking Dashboard
                        </p>
                    </div>
                    
                    <div className={`verdict-box ${analytics.verdict.status}`}>
                        <div className="verdict-status">{analytics.verdict.status}</div>
                        <div className="verdict-message">{analytics.verdict.message}</div>
                        <div className="verdict-action">→ {analytics.verdict.action}</div>
                    </div>
                    
                    <div className="card">
                        <div className="section-title">📈 Key Metrics</div>
                        <div className="metric-grid">
                            <div className="metric-box">
                                <div className={`metric-value ${getMetricColor(analytics.total_return_pct)}`}>
                                    {analytics.total_return_pct >= 0 ? '+' : ''}{analytics.total_return_pct.toFixed(2)}%
                                </div>
                                <div className="metric-label">Total Return</div>
                            </div>
                            
                            <div className="metric-box">
                                <div className="metric-value neutral">
                                    {analytics.win_rate.toFixed(1)}%
                                </div>
                                <div className="metric-label">Win Rate</div>
                            </div>
                            
                            <div className="metric-box">
                                <div className="metric-value neutral">
                                    {analytics.sharpe_ratio.toFixed(2)}
                                </div>
                                <div className="metric-label">Sharpe Ratio</div>
                            </div>
                            
                            <div className="metric-box">
                                <div className="metric-value negative">
                                    -{analytics.max_drawdown_pct.toFixed(2)}%
                                </div>
                                <div className="metric-label">Max Drawdown</div>
                            </div>
                            
                            <div className="metric-box">
                                <div className="metric-value neutral">
                                    {analytics.profit_factor.toFixed(2)}
                                </div>
                                <div className="metric-label">Profit Factor</div>
                            </div>
                            
                            <div className="metric-box">
                                <div className="metric-value neutral">
                                    {analytics.avg_win_loss_ratio.toFixed(2)}x
                                </div>
                                <div className="metric-label">Avg Win/Loss</div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="card">
                        <div className="section-title">📊 Trading Activity</div>
                        <div className="metric-grid">
                            <div className="metric-box">
                                <div className="metric-value neutral">{analytics.total_trades}</div>
                                <div className="metric-label">Total Trades</div>
                            </div>
                            <div className="metric-box">
                                <div className="metric-value neutral">{analytics.days_running}</div>
                                <div className="metric-label">Days Running</div>
                            </div>
                            <div className="metric-box">
                                <div className="metric-value neutral">{analytics.trades_per_week.toFixed(1)}</div>
                                <div className="metric-label">Trades/Week</div>
                            </div>
                            <div className="metric-box">
                                <div className={`metric-value ${getMetricColor(status.account.pnl)}`}>
                                    ${status.account.equity.toLocaleString('en-US', {minimumFractionDigits: 2})}
                                </div>
                                <div className="metric-label">Current Equity</div>
                            </div>
                        </div>
                    </div>
                    
                    {status.scores && Object.keys(status.scores).length > 0 && (
                        <div className="card">
                            <div className="section-title">🎯 Top Opportunities</div>
                            {Object.entries(status.scores).slice(0, 5).map(([symbol, data]) => (
                                <div className="score-item" key={symbol}>
                                    <div className="score-header">
                                        <span style={{fontWeight: 700}}>{symbol}</span>
                                        <span style={{color: '#667eea', fontWeight: 700}}>{data.score.toFixed(1)}</span>
                                    </div>
                                    <div style={{fontSize: '13px', color: '#64748b'}}>
                                        ${data.price.toLocaleString()} · {data.signal}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                    
                    <div className="footer">
                        <div>Last updated: {new Date(analytics.last_updated).toLocaleString()}</div>
                        <div style={{marginTop: '8px'}}>RAYR QUANT · Auto-refreshes every 60s</div>
                        <div style={{marginTop: '12px'}}>
                            <a href="https://github.com/Rayr-06/AUTOBOT-RAYR-QUANT/actions" 
                               style={{color: 'rgba(255,255,255,0.7)'}}>
                                View Bot Runs →
                            </a>
                        </div>
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
