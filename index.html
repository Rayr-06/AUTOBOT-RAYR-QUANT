<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOBOT RAYR QUANT - Live Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 480px; margin: 0 auto; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            animation: slideUp 0.4s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 40px 24px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
        }
        
        .header h1 { font-size: 28px; margin-bottom: 12px; }
        .header-subtitle { opacity: 0.9; font-size: 14px; margin-bottom: 16px; }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.25);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .equity-display { text-align: center; padding: 32px 0; }
        
        .equity-amount {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .equity-label {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .pnl {
            font-size: 24px;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 12px;
            display: inline-block;
        }
        
        .pnl.positive { color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .pnl.negative { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .pnl.neutral { color: #64748b; background: rgba(100, 116, 139, 0.1); }
        
        .score-item {
            margin-bottom: 24px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 12px;
        }
        
        .score-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .score-symbol { font-weight: 700; font-size: 18px; }
        
        .score-value {
            font-weight: 800;
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .score-bar-bg {
            background: #e2e8f0;
            height: 10px;
            border-radius: 5px;
            margin-bottom: 8px;
        }
        
        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
            transition: width 0.5s;
        }
        
        .score-details {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #64748b;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .empty-state { text-align: center; padding: 48px 24px; color: #94a3b8; }
        .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-top: 32px;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        function Dashboard() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            
            const fetchData = async () => {
                try {
                    const response = await fetch('data/status.json?' + new Date().getTime());
                    const status = await response.json();
                    setData(status);
                    setLoading(false);
                } catch (error) {
                    console.error('Error:', error);
                    setLoading(false);
                }
            };
            
            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 60000);
                return () => clearInterval(interval);
            }, []);
            
            if (loading) {
                return (
                    <div className="container">
                        <div style={{textAlign: 'center', padding: '80px 24px', color: 'white'}}>
                            <div className="spinner"></div>
                            <p style={{marginTop: '16px'}}>Loading dashboard...</p>
                        </div>
                    </div>
                );
            }
            
            if (!data) {
                return (
                    <div className="container">
                        <div className="empty-state" style={{color: 'white'}}>
                            Bot initializing... Please wait.
                        </div>
                    </div>
                );
            }
            
            const pnlClass = data.account.pnl > 0 ? 'positive' : data.account.pnl < 0 ? 'negative' : 'neutral';
            
            return (
                <div className="container">
                    <div className="header">
                        <h1>🤖 AUTOBOT RAYR QUANT</h1>
                        <p className="header-subtitle">Cloud-Hosted Trading Bot</p>
                        <div className="status-badge">
                            <div className="status-dot"></div>
                            <span>Running on GitHub</span>
                        </div>
                    </div>
                    
                    <div className="card">
                        <div className="equity-display">
                            <div className="equity-amount">
                                ${data.account.equity.toLocaleString('en-US', {minimumFractionDigits: 2})}
                            </div>
                            <div className="equity-label">Total Equity</div>
                            <div className={`pnl ${pnlClass}`}>
                                {data.account.pnl >= 0 ? '+' : ''}${Math.abs(data.account.pnl).toFixed(2)} 
                                ({data.account.pnl_pct >= 0 ? '+' : ''}{data.account.pnl_pct.toFixed(2)}%)
                            </div>
                        </div>
                    </div>
                    
                    <div className="card">
                        <div className="section-title">📊 Confluence Scores</div>
                        {Object.entries(data.scores || {}).map(([symbol, score]) => (
                            <div className="score-item" key={symbol}>
                                <div className="score-header">
                                    <span className="score-symbol">{symbol}</span>
                                    <span className="score-value">{score.score.toFixed(1)}</span>
                                </div>
                                <div className="score-bar-bg">
                                    <div className="score-bar-fill" style={{width: `${score.score}%`}}></div>
                                </div>
                                <div className="score-details">
                                    <span>${score.price.toLocaleString()}</span>
                                    <span>{score.signal}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <div className="card">
                        <div className="section-title">
                            📈 Open Positions
                            <span className="badge">{data.positions.length}</span>
                        </div>
                        {data.positions.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-icon">💤</div>
                                <div>No open positions</div>
                            </div>
                        ) : (
                            data.positions.map((pos, idx) => (
                                <div key={idx} style={{padding: '12px', background: '#f8fafc', borderRadius: '8px', marginBottom: '8px'}}>
                                    <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '4px'}}>
                                        <strong>{pos.symbol}</strong>
                                        <span className={pos.unrealized_pnl >= 0 ? 'pnl positive' : 'pnl negative'}>
                                            ${pos.unrealized_pnl.toFixed(2)}
                                        </span>
                                    </div>
                                    <div style={{fontSize: '14px', color: '#64748b'}}>
                                        {pos.qty.toFixed(6)} @ ${pos.avg_price.toLocaleString()}
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                    
                    <div className="footer">
                        <div>Last updated: {new Date(data.timestamp).toLocaleString()}</div>
                        <div style={{marginTop: '8px'}}>
                            AUTOBOT RAYR QUANT · Runs every hour on GitHub Actions
                        </div>
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
